<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazorBodyBuilder</title>
    <base href="/BlazorBodyBuilder/" />

    <!-- El único archivo CSS real generado por Tailwind v4 -->
    <link rel="stylesheet" href="css/app.css" />

    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />

    <!-- Importación de tipografías nativas de Fitness y Lectura desde Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">

</head>

<body class="bg-slate-900 text-slate-100 antialiased selection:bg-indigo-500 selection:text-white">

    <!-- Pantilla de carga estilizada con Tailwind v4 mientras C# inicializa en el navegador -->
    <div id="app" class="flex flex-col items-center justify-center min-h-screen gap-4">
        <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-sm font-medium text-slate-400 tracking-wide">Cargando aplicación ...</p>
    </div>

    <!-- Barra de error unhandled optimizada con Tailwind v4 (oculta por defecto mediante id de Blazor) -->
    <div id="blazor-error-ui" class="hidden fixed bottom-4 left-4 right-4 md:left-auto md:max-w-md bg-rose-950 border border-rose-800 text-rose-200 p-4 rounded-xl shadow-2xl z-50 flex items-center justify-between gap-4">
        <div class="flex flex-col gap-0.5">
            <p class="font-bold text-sm">Ocurrió un error inesperado</p>
            <p class="text-xs text-rose-300">La aplicación web falló al ejecutarse.</p>
        </div>
        <div class="flex items-center gap-2 shrink-0">
            <a href="" class="reload px-3 py-1.5 bg-rose-600 hover:bg-rose-700 text-white rounded-lg font-medium text-xs transition-colors shadow">Recargar</a>
            <a class="dismiss px-2.5 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg font-medium text-xs transition-colors cursor-pointer">✕</a>
        </div>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <!-- Cambia esto para forzar el soporte offline en tus pruebas locales -->
    <script>navigator.serviceWorker.register('service-worker.published.js');</script>

</body>

</html>
